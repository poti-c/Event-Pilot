name: CI

on:
  pull_request:
    branches: [master]

# Cancel a stale run when the PR gets a new push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # No Supabase secrets here on purpose: PRs (including from forks) don't
      # need them since the app falls back to offline mode when they're blank.
      - name: Build
        run: npm run build
