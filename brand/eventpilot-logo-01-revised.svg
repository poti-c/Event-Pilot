<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">EventPilot revised logo concept 1</title>
  <desc id="desc">EventPilot logo with a navy app mark, subtle compass, and three operational lines.</desc>
  <defs>
    <linearGradient id="markGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#235f8f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f4f7fa; }
      .card { fill: #ffffff; filter: url(#shadow); }
      .ink { fill: #0f172a; }
      .muted { fill: #607089; }
      .accent { fill: #235f8f; }
      .word { font: 900 76px Inter, Arial, sans-serif; letter-spacing: 0; }
      .tag { font: 700 25px Inter, Arial, sans-serif; letter-spacing: 5px; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720"/>
  <rect class="card" x="105" y="122" width="990" height="476" rx="34"/>

  <g transform="translate(190 230)">
    <rect width="210" height="210" rx="46" fill="url(#markGradient)"/>

    <g opacity="0.34" transform="translate(105 105)">
      <circle r="68" fill="none" stroke="#d99a2b" stroke-width="7"/>
      <circle r="36" fill="none" stroke="#d99a2b" stroke-width="4"/>
      <path d="M0-78v28M0 50v28M-78 0h28M50 0h28" fill="none" stroke="#d99a2b" stroke-width="7" stroke-linecap="round"/>
      <path d="M0-60l18 60-18 60-18-60z" fill="#d99a2b" transform="rotate(60)"/>
      <circle r="8" fill="#d99a2b"/>
    </g>

    <path d="M58 70h94M58 105h61M58 140h94" fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round"/>
    <path d="M58 70v70" fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round"/>
    <path d="M107 70h39c26 0 26 35 0 35h-39" fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(455 285)">
    <text x="0" y="70" class="word ink">EventPilot</text>
    <text x="5" y="118" class="tag muted">VENUE OPERATIONS</text>
    <rect x="6" y="152" width="325" height="8" rx="4" class="accent" opacity="0.18"/>
  </g>
</svg>
